name: Windows build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [Debug, ReleaseSafe, ReleaseFast, ReleaseSmall]
        cpu: [baseline, x86_64_v2, x86_64_v3]
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }} -Dcpu=${{ matrix.cpu }}

      - name: Stage artifact
        shell: pwsh
        run: |
          $conptyVersion = "1.23.251216003"
          $conptyUrl = "https://github.com/microsoft/terminal/releases/download/v1.23.13503.0/Microsoft.Windows.Console.ConPTY.$conptyVersion.nupkg"
          $conptyPackageHash = "119F8D06969703AA6530A236EB17DB33A7179A6BC35991E9076A7A63CABABFF7"
          $conptyDllHash = "1F5FFD52FF118DB975EEB25BAC0051F4CEFF3E051313FA03A5AFFFA9E75EE502"
          $openConsoleHash = "6B2915A9A91C0738346A6C6A7B3EE2B74E26582B0C92B1B16066E72570DDDD68"
          $conptyPackage = "Microsoft.Windows.Console.ConPTY.$conptyVersion.nupkg"
          $conptyExtractDir = "conpty-package"

          Invoke-WebRequest -Uri $conptyUrl -OutFile $conptyPackage
          $actualPackageHash = (Get-FileHash $conptyPackage -Algorithm SHA256).Hash
          if ($actualPackageHash -ne $conptyPackageHash) {
            throw "Unexpected ConPTY package hash: $actualPackageHash"
          }
          Expand-Archive -Path $conptyPackage -DestinationPath $conptyExtractDir -Force

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item zig-out/bin/Mostty.exe dist/
          if (Test-Path zig-out/bin/Mostty.pdb) { Copy-Item zig-out/bin/Mostty.pdb dist/ }
          Copy-Item zig-out/bin/themes dist/themes -Recurse
          New-Item -ItemType Directory -Force -Path dist/conpty | Out-Null
          Copy-Item "$conptyExtractDir/runtimes/win-x64/native/conpty.dll" dist/conpty/
          Copy-Item "$conptyExtractDir/build/native/runtimes/x64/OpenConsole.exe" dist/conpty/

          $actualDllHash = (Get-FileHash dist/conpty/conpty.dll -Algorithm SHA256).Hash
          if ($actualDllHash -ne $conptyDllHash) {
            throw "Unexpected conpty.dll hash: $actualDllHash"
          }
          $actualOpenConsoleHash = (Get-FileHash dist/conpty/OpenConsole.exe -Algorithm SHA256).Hash
          if ($actualOpenConsoleHash -ne $openConsoleHash) {
            throw "Unexpected OpenConsole.exe hash: $actualOpenConsoleHash"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: Mostty-windows-${{ matrix.cpu }}-${{ matrix.optimize }}
          path: dist/
          if-no-files-found: error
