name: Windows build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [Debug, ReleaseSafe, ReleaseFast, ReleaseSmall]
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item zig-out/bin/Mostty.exe dist/
          if (Test-Path zig-out/bin/Mostty.pdb) { Copy-Item zig-out/bin/Mostty.pdb dist/ }
          Copy-Item zig-out/bin/themes dist/themes -Recurse

      - uses: actions/upload-artifact@v4
        with:
          name: Mostty-windows-x86_64-${{ matrix.optimize }}
          path: dist/
          if-no-files-found: error
